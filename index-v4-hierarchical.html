<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方比赛管理系统 v4 - 层级项目</title>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tabulator for tables -->
    <link href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator_materialize.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.6.0/dist/js/tabulator.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .config-bar {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .config-bar input {
            flex: 1;
            min-width: 300px;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
        }
        .config-bar button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .config-bar button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        
        .content { padding: 30px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin: 15px 0;
        }
        
        /* 层级缩进样式 */
        .event-parent {
            background: #f8f9fa;
            font-weight: bold;
        }
        .event-child {
            padding-left: 30px !important;
            background: #ffffff;
        }
        
        @media (max-width: 767px) {
            .grid { grid-template-columns: 1fr; }
            .config-bar { flex-direction: column; }
            .config-bar input { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 魔方比赛管理系统 v4</h1>
            <p>层级项目结构 · 算法配置 · 高度可自定义</p>
        </div>
        
        <div class="config-bar">
            <input type="text" id="supabaseUrl" placeholder="Supabase URL" />
            <input type="text" id="supabaseKey" placeholder="Anon Key" />
            <button onclick="connectDB()">🔗 连接数据库</button>
            <button onclick="loadAllData()">🔄 刷新数据</button>
        </div>
        
        <div id="alertBox"></div>
        
        <div class="content">
            <h2>🎯 项目管理（层级结构）</h2>
            <div class="grid">
                <div>
                    <h3>添加项目</h3>
                    <div class="form-group">
                        <label>父项目（可选）</label>
                        <select id="event-parent">
                            <option value="">-- 顶级项目 --</option>
                        </select>
                        <small style="color: #6c757d; margin-top: 5px; display: block;">
                            选择父项目会创建子项目（如：三阶 → 三阶-AO5）
                        </small>
                    </div>
                    <div class="form-group">
                        <label>项目代码</label>
                        <input type="text" id="event-code" placeholder="如：3x3 或 3x3-ao5" />
                    </div>
                    <div class="form-group">
                        <label>项目名称</label>
                        <input type="text" id="event-name" placeholder="如：三阶魔方 或 三阶-AO5" />
                    </div>
                    <div class="form-group">
                        <label>算法类型</label>
                        <select id="event-algo-type">
                            <option value="single">单次最佳</option>
                            <option value="average">去头尾平均</option>
                            <option value="mean">算术平均</option>
                            <option value="best_of">最佳N次</option>
                            <option value="sub">SUB-X</option>
                        </select>
                    </div>
                    <div class="form-group" id="window-size-group" style="display: none;">
                        <label>窗口大小（如 AO5 填 5）</label>
                        <input type="number" id="event-window-size" placeholder="如：5" />
                    </div>
                    <button class="btn" onclick="addEvent()">➕ 添加项目</button>
                </div>
                <div>
                    <h3>项目列表（层级显示）</h3>
                    <div class="table-responsive"><div id="events-table"></div></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let dbClient = null;
        let eventsTable = null;
        
        // 连接数据库
        async function connectDB() {
            const url = document.getElementById('supabaseUrl').value;
            const key = document.getElementById('supabaseKey').value;
            
            if (!url || !key) {
                showAlert('请填写 Supabase URL 和 Key', 'error');
                return;
            }
            
            try {
                dbClient = supabase.createClient(url, key);
                localStorage.setItem('supabase_url', url);
                localStorage.setItem('supabase_key', key);
                showAlert('数据库连接成功！', 'success');
                await loadAllData();
            } catch (e) {
                showAlert('连接失败：' + e.message, 'error');
            }
        }
        
        // 加载所有数据
        async function loadAllData() {
            if (!dbClient) return;
            await Promise.all([
                loadEvents(),
                loadParentEvents()
            ]);
        }
        
        // 加载父项目下拉框
        async function loadParentEvents() {
            const { data } = await dbClient
                .from('events')
                .select('*')
                .is('parent_event_id', null)
                .order('sort_order');
            
            const sel = document.getElementById('event-parent');
            sel.innerHTML = '<option value="">-- 顶级项目 --</option>';
            (data || []).forEach(e => {
                sel.innerHTML += `<option value="${e.id}">${e.event_code} - ${e.event_name}</option>`;
            });
        }
        
        // 加载项目列表（层级显示）
        async function loadEvents() {
            const { data, error } = await dbClient
                .from('events')
                .select('*, parent:parent_event_id(event_code, event_name)')
                .order('COALESCE(parent_event_id::text, id::text), sort_order, event_code');
            
            if (error) {
                showAlert('加载项目失败：' + error.message, 'error');
                return;
            }
            
            // 组织层级数据
            const parentEvents = data.filter(e => !e.parent_event_id);
            const childEvents = data.filter(e => e.parent_event_id);
            
            // 构建层级结构
            const hierarchicalData = [];
            parentEvents.forEach(parent => {
                hierarchicalData.push({
                    ...parent,
                    _indent: 0,
                    _is_parent: true
                });
                childEvents
                    .filter(child => child.parent_event_id === parent.id)
                    .forEach(child => {
                        hierarchicalData.push({
                            ...child,
                            _indent: 1,
                            _is_parent: false,
                            parent_code: parent.event_code,
                            parent_name: parent.event_name
                        });
                    });
            });
            
            // 渲染表格
            if (eventsTable) eventsTable.destroy();
            eventsTable = new Tabulator('#events-table', {
                data: hierarchicalData,
                layout: 'fitColumns',
                columns: [
                    {
                        title: '项目代码',
                        field: 'event_code',
                        formatter: (cell) => {
                            const data = cell.getRow().getData();
                            const indent = data._indent || 0;
                            const prefix = indent > 0 ? '↳ ' : '';
                            return `<span style="padding-left: ${indent * 20}px;">${prefix}${data.event_code}</span>`;
                        },
                        width: 150
                    },
                    { title: '项目名称', field: 'event_name' },
                    { 
                        title: '父项目', 
                        field: 'parent_name',
                        formatter: (cell) => {
                            const data = cell.getRow().getData();
                            return data.parent_name ? `${data.parent_code} - ${data.parent_name}` : '-';
                        }
                    },
                    { 
                        title: '算法类型', 
                        formatter: (cell) => {
                            const data = cell.getRow().getData();
                            const algo = data.algorithm_config || {};
                            return algo.algorithm_type || '-';
                        }
                    },
                    { title: '操作', formatter: (cell) => {
                        const id = cell.getRow().getData().id;
                        return `<button onclick="deleteEvent('${id}')">删除</button>`;
                    }, width: 80 }
                ]
            });
        }
        
        // 添加项目
        async function addEvent() {
            const parentId = document.getElementById('event-parent').value || null;
            const code = document.getElementById('event-code').value.trim();
            const name = document.getElementById('event-name').value.trim();
            const algoType = document.getElementById('event-algo-type').value;
            const windowSize = document.getElementById('event-window-size').value;
            
            if (!code || !name) {
                showAlert('请填写项目代码和名称', 'error');
                return;
            }
            
            // 构建算法配置
            const algorithmConfig = {
                algorithm_type: algoType,
                is_lower_better: true,
                trim_count: algoType === 'average' ? 1 : 0
            };
            if (windowSize) {
                algorithmConfig.window_size = parseInt(windowSize);
            }
            
            // 保存到数据库
            const { error } = await dbClient
                .from('events')
                .insert({
                    event_code: code,
                    event_name: name,
                    parent_event_id: parentId,
                    is_sub_event: parentId !== null,
                    algorithm_config: algorithmConfig,
                    sort_order: 0
                });
            
            if (error) {
                showAlert('添加失败：' + error.message, 'error');
                return;
            }
            
            showAlert('项目添加成功！', 'success');
            document.getElementById('event-code').value = '';
            document.getElementById('event-name').value = '';
            await loadAllData();
        }
        
        // 删除项目
        async function deleteEvent(id) {
            if (!confirm('确定删除此项目？')) return;
            
            const { error } = await dbClient
                .from('events')
                .delete()
                .eq('id', id);
            
            if (error) {
                showAlert('删除失败：' + error.message, 'error');
                return;
            }
            
            showAlert('删除成功！', 'success');
            await loadAllData();
        }
        
        // 算法类型切换显示
        document.getElementById('event-algo-type').addEventListener('change', function() {
            const windowGroup = document.getElementById('window-size-group');
            if (this.value === 'average' || this.value === 'best_of') {
                windowGroup.style.display = 'block';
            } else {
                windowGroup.style.display = 'none';
            }
        });
        
        // 显示提示
        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.innerHTML = msg;
            box.className = 'alert alert-' + type;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }
        
        // 页面加载时恢复配置
        window.addEventListener('DOMContentLoaded', function() {
            const url = localStorage.getItem('supabase_url');
            const key = localStorage.getItem('supabase_key');
            if (url && key) {
                document.getElementById('supabaseUrl').value = url;
                document.getElementById('supabaseKey').value = key;
            }
        });
    </script>
</body>
</html>
