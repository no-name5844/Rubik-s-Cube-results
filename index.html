<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方比赛成绩管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .config-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .config-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .config-panel input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .config-panel input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .smart-fields {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }

        .smart-fields h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .message.info {
            background: #bee3f8;
            color: #2a4365;
            border-left: 4px solid #4299e1;
        }

        .data-preview {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .data-preview pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #2d3748;
            font-size: 13px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.connected {
            background: #48bb78;
            box-shadow: 0 0 10px #48bb78;
        }

        .status-indicator.disconnected {
            background: #f56565;
        }

        .help-text {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 魔方比赛成绩管理系统</h1>
            <p>记录每一次打乱、每一步复原</p>
        </div>

        <div class="config-panel">
            <h2>⚙️ Supabase 配置</h2>
            <div class="form-group">
                <label>Supabase URL</label>
                <input type="text" id="supabaseUrl" placeholder="https://xxxxx.supabase.co">
                <div class="help-text">在 Supabase 项目设置 → API 中找到 URL</div>
            </div>
            <div class="form-group">
                <label>Anon Key (公开密钥)</label>
                <input type="text" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
                <div class="help-text">在 Supabase 项目设置 → API 中找到 anon public key</div>
            </div>
            <button class="btn btn-primary" onclick="connectSupabase()">🔗 连接数据库</button>
            <span id="connectionStatus"></span>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('competition')">📅 添加比赛</button>
            <button class="tab" onclick="switchTab('attempt')">🎯 添加成绩</button>
            <button class="tab" onclick="switchTab('view')">📊 查看数据</button>
        </div>

        <!-- 添加比赛面板 -->
        <div id="competitionPanel" class="panel active">
            <h2 style="color: #667eea; margin-bottom: 20px;">添加新的比赛</h2>
            <div id="competitionMessage"></div>
            <div class="form-group">
                <label>比赛编号 *</label>
                <input type="text" id="compNumber" placeholder="如: COMP-2026-001" required>
            </div>
            <div class="form-group">
                <label>比赛名称 *</label>
                <input type="text" id="compName" placeholder="如: 2026春季魔方赛" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>比赛日期 *</label>
                    <input type="date" id="compDate" required>
                </div>
                <div class="form-group">
                    <label>比赛地点</label>
                    <input type="text" id="compLocation" placeholder="如: 北京">
                </div>
            </div>
            <div class="form-group">
                <label>主办方</label>
                <input type="text" id="compOrganizer" placeholder="如: 中国魔方协会">
            </div>
            <div class="form-group">
                <label>比赛描述</label>
                <textarea id="compDescription" placeholder="比赛详情..."></textarea>
            </div>
            <button class="btn btn-success" onclick="addCompetition()">✅ 添加比赛</button>
        </div>

        <!-- 添加成绩面板 -->
        <div id="attemptPanel" class="panel">
            <h2 style="color: #667eea; margin-bottom: 20px;">添加比赛成绩</h2>
            <div id="attemptMessage"></div>
            
            <div class="form-group">
                <label>选择比赛 *</label>
                <select id="attemptCompetition">
                    <option value="">-- 请先选择比赛 --</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>选手名称 *</label>
                    <input type="text" id="participantName" placeholder="如: 张三" required>
                </div>
                <div class="form-group">
                    <label>尝试序号 *</label>
                    <input type="number" id="attemptIndex" placeholder="第几次尝试 (1,2,3...)" min="1" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>魔方类型 *</label>
                    <select id="cubeType" onchange="toggleSmartFields()">
                        <option value="non_smart">非智能魔方</option>
                        <option value="smart">智能魔方</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>魔方型号/名称</label>
                    <input type="text" id="cubeName" placeholder="如: 魔域智能魔方 / GAN12">
                </div>
            </div>

            <div class="form-group">
                <label>魔方类别</label>
                <input type="text" id="cubeCategory" placeholder="如: 3x3, 2x2, Pyraminx">
            </div>

            <div class="form-group">
                <label>打乱公式 *</label>
                <textarea id="scramble" placeholder="如: R U R' U' R U R' U'..." required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>复原时间 (秒) *</label>
                    <input type="number" id="solveTime" step="0.001" placeholder="如: 12.345" required>
                </div>
                <div class="form-group">
                    <label>惩罚</label>
                    <select id="penalty">
                        <option value="none">无惩罚</option>
                        <option value="plus_two">+2 秒</option>
                        <option value="dnf">DNF (未完成)</option>
                    </select>
                </div>
            </div>

            <!-- 智能魔方专属字段 -->
            <div id="smartFields" class="smart-fields" style="display: none;">
                <h3>🤖 智能魔方数据</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>步数 *</label>
                        <input type="number" id="moveCount" placeholder="如: 45">
                    </div>
                    <div class="form-group">
                        <label>TPS (步/秒) *</label>
                        <input type="number" id="tps" step="0.01" placeholder="如: 3.65">
                    </div>
                </div>
                <div class="form-group">
                    <label>复原步骤详情 (JSON)</label>
                    <textarea id="solveSteps" placeholder='{"moves": ["R", "U", "R'", ...], "phases": [...]}...'></textarea>
                    <div class="help-text">可选，记录每一步的详细信息（JSON格式）</div>
                </div>
            </div>

            <!-- 非智能魔方可选字段 -->
            <div id="nonSmartFields">
                <div class="form-group">
                    <label>录像链接 (非智能魔方可选)</label>
                    <input type="text" id="videoUrl" placeholder="https://... (用于复盘分析)">
                </div>
            </div>

            <div class="form-group">
                <label>备注</label>
                <textarea id="attemptNotes" placeholder="其他备注信息..."></textarea>
            </div>

            <button class="btn btn-success" onclick="addAttempt()">✅ 添加成绩</button>
        </div>

        <!-- 查看数据面板 -->
        <div id="viewPanel" class="panel">
            <h2 style="color: #667eea; margin-bottom: 20px;">查看数据</h2>
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="loadCompetitions()">📅 加载比赛列表</button>
                <button class="btn btn-primary" onclick="loadAttempts()">🎯 加载成绩记录</button>
                <button class="btn btn-primary" onclick="loadStats()">📊 加载统计</button>
            </div>
            <div id="viewMessage"></div>
            <div id="dataPreview" class="data-preview" style="display: none;">
                <pre id="dataContent"></pre>
            </div>
        </div>
    </div>

    <script>
        let supabase = null;
        let isConnected = false;

        // 连接 Supabase
        async function connectSupabase() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();

            if (!url || !key) {
                showMessage('competitionMessage', '请填写完整的 Supabase URL 和 Key', 'error');
                return;
            }

            try {
                supabase = window.supabase.createClient(url, key);
                
                // 测试连接
                const { data, error } = await supabase.from('competitions').select('count').limit(1);
                
                if (error) throw error;
                
                isConnected = true;
                document.getElementById('connectionStatus').innerHTML = 
                    '<span class="status-indicator connected"></span><span style="color: #48bb78; font-weight: 600;">已连接</span>';
                
                showMessage('competitionMessage', '🎉 成功连接到数据库！', 'success');
                
                // 加载比赛列表
                loadCompetitionsForSelect();
            } catch (error) {
                isConnected = false;
                document.getElementById('connectionStatus').innerHTML = 
                    '<span class="status-indicator disconnected"></span><span style="color: #f56565; font-weight: 600;">连接失败</span>';
                showMessage('competitionMessage', '连接失败: ' + error.message, 'error');
            }
        }

        // 切换智能魔方字段显示
        function toggleSmartFields() {
            const cubeType = document.getElementById('cubeType').value;
            const smartFields = document.getElementById('smartFields');
            const nonSmartFields = document.getElementById('nonSmartFields');
            
            if (cubeType === 'smart') {
                smartFields.style.display = 'block';
                nonSmartFields.style.display = 'none';
            } else {
                smartFields.style.display = 'none';
                nonSmartFields.style.display = 'block';
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            // 更新标签样式
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // 更新面板显示
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(tabName + 'Panel').classList.add('active');
        }

        // 显示消息
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => element.innerHTML = '', 5000);
        }

        // 添加比赛
        async function addCompetition() {
            if (!isConnected) {
                showMessage('competitionMessage', '请先连接数据库！', 'error');
                return;
            }

            const compNumber = document.getElementById('compNumber').value.trim();
            const compName = document.getElementById('compName').value.trim();
            const compDate = document.getElementById('compDate').value;
            const compLocation = document.getElementById('compLocation').value.trim();
            const compOrganizer = document.getElementById('compOrganizer').value.trim();
            const compDescription = document.getElementById('compDescription').value.trim();

            if (!compNumber || !compName || !compDate) {
                showMessage('competitionMessage', '请填写必填字段（编号、名称、日期）', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('competitions')
                    .insert([{
                        competition_number: compNumber,
                        name: compName,
                        competition_date: compDate,
                        location: compLocation || null,
                        organizer: compOrganizer || null,
                        description: compDescription || null
                    }])
                    .select();

                if (error) throw error;

                showMessage('competitionMessage', `✅ 比赛添加成功！ID: ${data[0].id}`, 'success');
                
                // 清空表单
                document.getElementById('compNumber').value = '';
                document.getElementById('compName').value = '';
                document.getElementById('compDate').value = '';
                document.getElementById('compLocation').value = '';
                document.getElementById('compOrganizer').value = '';
                document.getElementById('compDescription').value = '';

                // 重新加载比赛列表
                loadCompetitionsForSelect();
            } catch (error) {
                if (error.code === '23505') {
                    showMessage('competitionMessage', '❌ 比赛编号已存在！请使用不同的编号。', 'error');
                } else {
                    showMessage('competitionMessage', '❌ 添加失败: ' + error.message, 'error');
                }
            }
        }

        // 为下拉列表加载比赛
        async function loadCompetitionsForSelect() {
            if (!isConnected) return;

            try {
                const { data, error } = await supabase
                    .from('competitions')
                    .select('id, competition_number, name')
                    .order('competition_date', { ascending: false });

                if (error) throw error;

                const select = document.getElementById('attemptCompetition');
                select.innerHTML = '<option value="">-- 请选择比赛 --</option>';
                
                data.forEach(comp => {
                    const option = document.createElement('option');
                    option.value = comp.id;
                    option.textContent = `${comp.competition_number} - ${comp.name}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载比赛列表失败:', error);
            }
        }

        // 添加成绩
        async function addAttempt() {
            if (!isConnected) {
                showMessage('attemptMessage', '请先连接数据库！', 'error');
                return;
            }

            const competitionId = document.getElementById('attemptCompetition').value;
            const participantName = document.getElementById('participantName').value.trim();
            const attemptIndex = parseInt(document.getElementById('attemptIndex').value);
            const cubeType = document.getElementById('cubeType').value;
            const cubeName = document.getElementById('cubeName').value.trim();
            const cubeCategory = document.getElementById('cubeCategory').value.trim();
            const scramble = document.getElementById('scramble').value.trim();
            const solveTime = parseFloat(document.getElementById('solveTime').value);
            const penalty = document.getElementById('penalty').value;
            const notes = document.getElementById('attemptNotes').value.trim();

            if (!competitionId || !participantName || !attemptIndex || !scramble || !solveTime) {
                showMessage('attemptMessage', '请填写所有必填字段', 'error');
                return;
            }

            // 生成唯一编号
            const attemptNumber = `${document.querySelector(`#attemptCompetition option[value="${competitionId}"]`).textContent.split(' - ')[0]}-ATT-${String(attemptIndex).padStart(3, '0')}`;

            // 构建数据对象
            const attemptData = {
                attempt_number: attemptNumber,
                competition_id: competitionId,
                participant_name: participantName,
                attempt_index: attemptIndex,
                cube_type: cubeType,
                cube_name: cubeName || null,
                cube_category: cubeCategory || null,
                scramble: scramble,
                solve_time: solveTime,
                is_dnf: penalty === 'dnf',
                is_plus_two: penalty === 'plus_two',
                notes: notes || null
            };

            // 智能魔方专属数据
            if (cubeType === 'smart') {
                const moveCount = document.getElementById('moveCount').value;
                const tps = document.getElementById('tps').value;
                const solveSteps = document.getElementById('solveSteps').value.trim();

                if (!moveCount || !tps) {
                    showMessage('attemptMessage', '智能魔方必须填写步数和 TPS！', 'error');
                    return;
                }

                attemptData.move_count = parseInt(moveCount);
                attemptData.tps = parseFloat(tps);
                
                if (solveSteps) {
                    try {
                        attemptData.solve_steps = JSON.parse(solveSteps);
                    } catch (e) {
                        showMessage('attemptMessage', '复原步骤 JSON 格式错误！', 'error');
                        return;
                    }
                }
            } else {
                // 非智能魔方
                const videoUrl = document.getElementById('videoUrl').value.trim();
                if (videoUrl) {
                    attemptData.video_url = videoUrl;
                }
            }

            try {
                const { data, error } = await supabase
                    .from('attempts')
                    .insert([attemptData])
                    .select();

                if (error) throw error;

                showMessage('attemptMessage', `✅ 成绩添加成功！编号: ${attemptData.attempt_number}`, 'success');
                
                // 清空表单（保留比赛选择）
                document.getElementById('participantName').value = '';
                document.getElementById('attemptIndex').value = '';
                document.getElementById('cubeName').value = '';
                document.getElementById('cubeCategory').value = '';
                document.getElementById('scramble').value = '';
                document.getElementById('solveTime').value = '';
                document.getElementById('penalty').value = 'none';
                document.getElementById('moveCount').value = '';
                document.getElementById('tps').value = '';
                document.getElementById('solveSteps').value = '';
                document.getElementById('videoUrl').value = '';
                document.getElementById('attemptNotes').value = '';
            } catch (error) {
                if (error.code === '23505') {
                    showMessage('attemptMessage', '❌ 尝试编号已存在！请检查尝试序号。', 'error');
                } else {
                    showMessage('attemptMessage', '❌ 添加失败: ' + error.message, 'error');
                }
            }
        }

        // 加载比赛列表
        async function loadCompetitions() {
            if (!isConnected) {
                showMessage('viewMessage', '请先连接数据库！', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('competitions')
                    .select('*')
                    .order('competition_date', { ascending: false });

                if (error) throw error;

                displayData(data);
                showMessage('viewMessage', `✅ 成功加载 ${data.length} 条比赛记录`, 'success');
            } catch (error) {
                showMessage('viewMessage', '❌ 加载失败: ' + error.message, 'error');
            }
        }

        // 加载成绩记录
        async function loadAttempts() {
            if (!isConnected) {
                showMessage('viewMessage', '请先连接数据库！', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('attempts')
                    .select(`
                        *,
                        competitions (competition_number, name)
                    `)
                    .order('created_at', { ascending: false })
                    .limit(100);

                if (error) throw error;

                displayData(data);
                showMessage('viewMessage', `✅ 成功加载 ${data.length} 条成绩记录`, 'success');
            } catch (error) {
                showMessage('viewMessage', '❌ 加载失败: ' + error.message, 'error');
            }
        }

        // 加载统计
        async function loadStats() {
            if (!isConnected) {
                showMessage('viewMessage', '请先连接数据库！', 'error');
                return;
            }

            try {
                const { data: compStats, error: compError } = await supabase
                    .from('competition_stats')
                    .select('*');

                if (compError) throw compError;

                const { data: partStats, error: partError } = await supabase
                    .from('participant_stats')
                    .select('*');

                if (partError) throw partError;

                const stats = {
                    competition_stats: compStats,
                    participant_stats: partStats
                };

                displayData(stats);
                showMessage('viewMessage', `✅ 成功加载统计数据`, 'success');
            } catch (error) {
                showMessage('viewMessage', '❌ 加载失败: ' + error.message, 'error');
            }
        }

        // 显示数据
        function displayData(data) {
            const preview = document.getElementById('dataPreview');
            const content = document.getElementById('dataContent');
            
            content.textContent = JSON.stringify(data, null, 2);
            preview.style.display = 'block';
        }

        // 页面加载时自动填充保存的配置
        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('supabase_url');
            const savedKey = localStorage.getItem('supabase_key');

            if (savedUrl) document.getElementById('supabaseUrl').value = savedUrl;
            if (savedKey) document.getElementById('supabaseKey').value = savedKey;
        });

        // 保存配置到本地
        document.getElementById('supabaseUrl').addEventListener('change', (e) => {
            localStorage.setItem('supabase_url', e.target.value);
        });

        document.getElementById('supabaseKey').addEventListener('change', (e) => {
            localStorage.setItem('supabase_key', e.target.value);
        });
    </script>
</body>
</html>
