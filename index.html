<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方比赛成绩管理系统 v5</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tabulator for tables -->
    <link href="https://unpkg.com/tabulator-tables@5.6.0/dist/css/tabulator_materialize.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.6.0/dist/js/tabulator.min.js"></script>
    
    <!-- Chart.js for Gamma distribution chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    
    <!-- Event Config Definition -->
    <script src="event-config.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 魔方比赛成绩管理系统</h1>
            <p>v5 - 层级项目 · 算法配置 · Gamma MLE 预测</p>
        </div>
        
        <div class="config-bar">
            <input type="text" id="supabase-url" placeholder="Supabase URL" />
            <input type="text" id="supabase-key" placeholder="Anon Key" />
            <button onclick="connectDB()">🔗 连接数据库</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('competitions')">🏆 比赛管理</div>
            <div class="tab" onclick="switchTab('events')">⚙️ 项目管理</div>
            <div class="tab" onclick="switchTab('participants')">👤 选手管理</div>
            <div class="tab" onclick="switchTab('attempts')">⏱️ 成绩录入</div>
            <div class="tab" onclick="switchTab('stats')">📊 统计分析</div>
        </div>
        
        <!-- 比赛管理 -->
        <div id="tab-competitions" class="tab-content active">
            <div class="grid">
                <div>
                    <h3>添加比赛</h3>
                    <div class="form-group">
                        <label>比赛编号</label>
                        <input type="text" id="comp-number" placeholder="如：WCA-2024-001">
                    </div>
                    <div class="form-group">
                        <label>比赛名称</label>
                        <input type="text" id="comp-name" placeholder="如：2024城市魔方赛">
                    </div>
                    <div class="form-group">
                        <label>比赛日期</label>
                        <input type="date" id="comp-date">
                    </div>
                    <div class="form-group">
                        <label>地点</label>
                        <input type="text" id="comp-location" placeholder="如：北京">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="comp-notes" rows="3"></textarea>
                    </div>
                    <button class="btn" onclick="addCompetition()">➕ 添加比赛</button>
                </div>
                <div>
                    <h3>比赛列表</h3>
                    <div class="table-responsive">
                        <div id="competitions-table"></div>
                    </div>
                    <hr style="margin: 20px 0; border: none; border-top: 1px solid #e9ecef;">
                    <h3>为比赛配置项目</h3>
                    <div class="form-group">
                        <label>选择比赛</label>
                        <select id="config-competition" onchange="loadConfigCompetitionEvents()"></select>
                    </div>
                    <div class="form-group">
                        <label>添加项目</label>
                        <select id="config-event"></select>
                    </div>
                    <button class="btn btn-success" onclick="addEventToCompetition()">➕ 添加到比赛</button>
                </div>
            </div>
        </div>
        
        <!-- 项目管理 -->
        <div id="tab-events" class="tab-content">
            <div class="grid">
                <div>
                    <h3>添加项目</h3>
                    <div class="form-group">
                        <label>项目代码</label>
                        <input type="text" id="event-code" placeholder="如：3x3-ao5">
                    </div>
                    <div class="form-group">
                        <label>项目名称</label>
                        <input type="text" id="event-name" placeholder="如：三阶 - AO5">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="event-desc" placeholder="如：三阶速拧最近5次平均">
                    </div>
                    <div class="form-group">
                        <label>父项目（可选）</label>
                        <select id="event-parent">
                            <option value="">-- 顶级项目（无父项目）--</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>算法类型</label>
                        <select id="event-algo-type">
                            <option value="single">单次最佳</option>
                            <option value="average" selected>平均（去头尾）</option>
                            <option value="mean">算术平均</option>
                            <option value="best_of">最佳 of N</option>
                            <option value="sub">SUB-X</option>
                        </select>
                    </div>
                    <!-- 表单式配置界面 -->
                    <div class="form-group">
                        <label>⚙️ 项目配置（表单模式）</label>
                        <div id="config-form-wrapper" style="border:1px solid #dee2e6; border-radius:10px; padding:16px; background:#fafbfc; max-height:50vh; overflow-y:auto;">
                            <div style="background:#e8f5e9; border-radius:8px; padding:14px; margin-bottom:18px;">
                                <div style="font-weight:600; color:#2e7d32; margin-bottom:8px;">📋 从模板快速填充</div>
                                <select id="config-template-select" onchange="onConfigTemplateSelected()" style="width:100%; padding:8px 12px; border-radius:6px; border:1px solid #a5d6a7; font-size:14px;">
                                    <option value="">-- 选择模板（自动填充下方表单）--</option>
                                </select>
                                <div id="template-desc" style="font-size:12px; color:#555; margin-top:6px;"></div>
                            </div>
                            <div id="event-config-fields"></div>
                            <hr style="margin:18px 0; border:none; border-top:1px solid #ddd;">
                            <div id="algorithm-config-fields" style="background:#fff3e0; border-radius:8px; padding:14px;">
                                <div style="font-weight:600; color:#e65100; margin-bottom:10px;">🧮 算法配置（algorithm_config）</div>
                                <div id="algo-config-fields-inner"></div>
                            </div>
                            <div style="margin-top:14px; text-align:right;">
                                <button class="btn btn-success" onclick="onExportConfigJSON()" style="padding:8px 18px; font-size:13px; margin-right:8px;">📤 导出 JSON</button>
                                <button class="btn" onclick="onImportConfigJSON()" style="padding:8px 18px; font-size:13px;">📥 导入 JSON</button>
                            </div>
                        </div>
                    </div>
                    <details style="margin-top:10px;">
                        <summary style="cursor:pointer; color:#667eea; font-size:13px;">🔍 查看 / 编辑原始 JSON（高级）</summary>
                        <textarea id="event-config-json" rows="10" style="width:100%; margin-top:8px; font-family:'Courier New',monospace; font-size:12px;" placeholder="配置 JSON 将自动同步到此处"></textarea>
                    </details>
                    <button class="btn" onclick="saveConfigFromForm()">💾 保存配置</button>
                    <button class="btn btn-success" onclick="onLoadDefaultConfigToForm()" style="margin-left: 10px;">📋 加载默认配置</button>
                </div>
                <div>
                    <h3>项目列表</h3>
                    <div class="table-responsive">
                        <div id="events-table"></div>
                    </div>
                    <hr style="margin: 20px 0; border: none; border-top: 1px solid #e9ecef;">
                    <h3>项目配置查看 / 编辑</h3>
                    <div class="form-group">
                        <label>选择项目</label>
                        <select id="config-event-select" onchange="loadEventConfigToForm()"></select>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 选手管理 -->
        <div id="tab-participants" class="tab-content">
            <div class="grid">
                <div>
                    <h3>添加选手</h3>
                    <div class="form-group">
                        <label>选手姓名</label>
                        <input type="text" id="participant-name" placeholder="如：张三">
                    </div>
                    <div class="form-group">
                        <label>WCA ID（可选）</label>
                        <input type="text" id="participant-wca" placeholder="如：2019ZHAN01">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="participant-notes" rows="3"></textarea>
                    </div>
                    <button class="btn" onclick="addParticipant()">➕ 添加选手</button>
                </div>
                <div>
                    <h3>选手列表</h3>
                    <div class="table-responsive">
                        <div id="participants-table"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 成绩录入 -->
        <div id="tab-attempts" class="tab-content">
            <div class="grid">
                <div>
                    <h3>录入成绩</h3>
                    <div class="form-group">
                        <label>选择比赛</label>
                        <select id="attempt-competition" onchange="loadCompetitionEventsForAttempt()"></select>
                    </div>
                    <div class="form-group">
                        <label>选择项目</label>
                        <select id="attempt-event"></select>
                    </div>
                    <div class="form-group">
                        <label>选择选手</label>
                        <select id="attempt-participant"></select>
                    </div>
                    <div class="form-group">
                        <label>尝试编号</label>
                        <input type="text" id="attempt-id" placeholder="如：1 或 A 或 Round1-1">
                    </div>
                    <div class="form-group">
                        <label>魔方类型</label>
                        <select id="attempt-cube-type" onchange="toggleSmartFields()">
                            <option value="non_smart" selected>非智能魔方</option>
                            <option value="smart">智能魔方</option>
                        </select>
                    </div>
                    <div id="smart-fields" class="smart-fields" style="display:none;">
                        <div class="form-group">
                            <label>步数（智能魔方自动记录）</label>
                            <input type="number" id="attempt-move-count" placeholder="如：45">
                        </div>
                        <div class="form-group">
                            <label>TPS（智能魔方自动计算）</label>
                            <input type="number" id="attempt-tps" step="0.001" placeholder="如：2.500">
                        </div>
                    </div>
                    <div id="non-smart-fields" class="non-smart-fields">
                        <div class="form-group">
                            <label>录像链接（可选）</label>
                            <input type="text" id="attempt-video" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>复原时间（秒）</label>
                        <input type="number" id="attempt-time" step="0.001" placeholder="如：12.345">
                    </div>
                    <div class="form-group">
                        <label>惩罚</label>
                        <select id="attempt-penalty">
                            <option value="none" selected>无</option>
                            <option value="+2">+2 秒</option>
                            <option value="dnf">DNF</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="attempt-notes" rows="2"></textarea>
                    </div>
                    <button class="btn" onclick="addAttempt()">💾 保存成绩</button>
                </div>
                <div>
                    <h3>最近成绩</h3>
                    <div class="table-responsive">
                        <div id="attempts-table"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 统计分析 -->
        <div id="tab-stats" class="tab-content">
            <div class="grid">
                <div>
                    <h3>查看统计</h3>
                    <div class="form-group">
                        <label>选择比赛</label>
                        <select id="view-competition" onchange="loadCompetitionEventsForView()"></select>
                    </div>
                    <div class="form-group">
                        <label>选择项目</label>
                        <select id="view-event"></select>
                    </div>
                    <button class="btn btn-success" onclick="loadViewData()">📊 加载数据</button>
                    <hr style="margin: 20px 0; border: none; border-top: 1px solid #e9ecef;">
                    <h3>Gamma MLE 预测</h3>
                    <div class="form-group">
                        <label>选择选手</label>
                        <select id="mle-participant"></select>
                    </div>
                    <div class="form-group">
                        <label>选择项目</label>
                        <select id="mle-event"></select>
                    </div>
                    <button class="btn" onclick="loadStats()">📈 计算预测</button>
                </div>
                <div>
                    <div id="stats-display"></div>
                    <div class="chart-container">
                        <canvas id="gamma-chart"></canvas>
                    </div>
                    <div id="view-table-container"></div>
                </div>
            </div>
        </div>
        
        <!-- 提示消息 -->
        <div id="alert-box" class="alert"></div>
    </div>
    
    <!-- JavaScript Files -->
    <script src="js/supabase-client.js"></script>
    <script src="js/ui-helpers.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/data-saver.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/event-config-ui.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 移动端对 tab 栏触摸滑动支持
            var tabs = document.querySelector('.tabs');
            if (tabs) {
                tabs.style.overflowX = 'auto';
                tabs.style.webkitOverflowScrolling = 'touch';
            }
            
            // 配置面板移到左列（DOM 操作）
            var panel = document.getElementById('config-panel-start');
            if (panel) {
                var grid = document.querySelector('#tab-events .grid');
                if (grid) {
                    var leftCol = grid.children[0];
                    if (leftCol) {
                        var btn = leftCol.querySelector('.btn[onclick*="addEvent"]');
                        if (btn) {
                            var hr = document.createElement('hr');
                            hr.style.margin = '20px 0';
                            hr.style.border = 'none';
                            hr.style.borderTop = '1px solid #e9ecef';
                            btn.insertAdjacentElement('afterend', hr);
                            hr.insertAdjacentElement('afterend', panel);
                        }
                    }
                }
            }
        });
        
        // 初始加载
        if (localStorage.getItem('supabase_url') && localStorage.getItem('supabase_key')) {
            document.getElementById('supabase-url').value = localStorage.getItem('supabase_url');
            document.getElementById('supabase-key').value = localStorage.getItem('supabase_key');
            connectDB();
        }
    </script>
</body>
</html>
