<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方比赛成绩管理系统 - 调试版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .debug-panel {
            background: #1a1a2e;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .debug-panel h3 {
            color: #0ff;
            margin-bottom: 10px;
        }

        .config-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .config-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .config-panel input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .config-panel input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .message.info {
            background: #bee3f8;
            color: #2a4365;
            border-left: 4px solid #4299e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 魔方比赛成绩管理系统</h1>
            <p>调试版 - 查看浏览器控制台获取详细日志 (F12)</p>
        </div>

        <!-- 调试信息面板 -->
        <div class="debug-panel">
            <h3>📊 调试日志</h3>
            <div id="debugLog">等待操作...</div>
        </div>

        <div class="config-panel">
            <h2>⚙️ Supabase 配置</h2>
            <div class="form-group">
                <label>Supabase URL</label>
                <input type="text" id="supabaseUrl" placeholder="https://xxxxx.supabase.co" value="">
            </div>
            <div class="form-group">
                <label>Anon Key</label>
                <input type="text" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIs..." value="">
            </div>
            <button class="btn btn-primary" onclick="debugConnect()">🔗 连接数据库 (调试版)</button>
            <span id="connectionStatus"></span>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('competition')">📅 添加比赛</button>
            <button class="tab" onclick="switchTab('attempt')">🎯 添加成绩</button>
        </div>

        <!-- 添加比赛面板 -->
        <div id="competitionPanel" class="panel active">
            <h2 style="color: #667eea; margin-bottom: 20px;">添加新的比赛</h2>
            <div id="competitionMessage"></div>
            <div class="form-group">
                <label>比赛编号 *</label>
                <input type="text" id="compNumber" placeholder="如: COMP-2026-001">
            </div>
            <div class="form-group">
                <label>比赛名称 *</label>
                <input type="text" id="compName" placeholder="如: 2026春季魔方赛">
            </div>
            <div class="form-group">
                <label>比赛日期 *</label>
                <input type="date" id="compDate">
            </div>
            <button class="btn btn-success" onclick="debugAddCompetition()">✅ 添加比赛 (调试版)</button>
        </div>

        <!-- 添加成绩面板 -->
        <div id="attemptPanel" class="panel">
            <h2 style="color: #667eea; margin-bottom: 20px;">添加比赛成绩</h2>
            <div id="attemptMessage"></div>
            <div class="form-group">
                <label>选手名称 *</label>
                <input type="text" id="participantName" placeholder="如: 张三">
            </div>
            <div class="form-group">
                <label>复原时间 (秒) *</label>
                <input type="number" id="solveTime" step="0.001" placeholder="如: 12.345">
            </div>
            <div class="form-group">
                <label>打乱公式 *</label>
                <textarea id="scramble" placeholder="如: R U R' U'..."></textarea>
            </div>
            <button class="btn btn-success" onclick="debugAddAttempt()">✅ 添加成绩 (调试版)</button>
        </div>
    </div>

    <script>
        let supabase = null;
        let debugLog = document.getElementById('debugLog');

        // 调试日志函数
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            debugLog.innerHTML += `<div>[${timestamp}] ${prefix} ${message}</div>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }

        // 检查 Supabase 库是否加载
        function checkSupabaseLibrary() {
            log('检查 Supabase 库加载状态...');
            
            if (typeof window.supabase === 'undefined') {
                log('Supabase 库未加载！请检查网络连接或 CDN', 'error');
                return false;
            }
            
            log('Supabase 库已加载', 'success');
            log(`Supabase 对象: ${JSON.stringify(Object.keys(window.supabase))}`, 'info');
            return true;
        }

        // 连接数据库（调试版）
        async function debugConnect() {
            log('开始连接数据库...');
            
            // 检查库
            if (!checkSupabaseLibrary()) {
                alert('Supabase 库未加载！请检查网络连接后刷新页面。');
                return;
            }

            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();

            log(`URL: ${url}`);
            log(`Key 长度: ${key.length}`);

            if (!url || !key) {
                log('URL 或 Key 为空！', 'error');
                alert('请填写完整的 Supabase URL 和 Key');
                return;
            }

            try {
                log('正在创建 Supabase 客户端...');
                
                // 尝试不同的初始化方式
                let client = null;
                
                if (window.supabase.createClient) {
                    log('使用 window.supabase.createClient()', 'info');
                    client = window.supabase.createClient(url, key);
                } else if (window.supabase.SupabaseClient) {
                    log('使用 new window.supabase.SupabaseClient()', 'info');
                    client = new window.supabase.SupabaseClient(url, key);
                } else {
                    throw new Error('无法找到 Supabase 初始化方法！');
                }
                
                supabase = client;
                log('Supabase 客户端创建成功', 'success');
                log(`客户端对象: ${JSON.stringify(Object.keys(supabase))}`, 'info');

                // 测试连接
                log('测试数据库连接...');
                const { data, error } = await supabase
                    .from('competitions')
                    .select('count')
                    .limit(1);

                if (error) {
                    log(`连接测试失败: ${error.message}`, 'error');
                    log(`错误详情: ${JSON.stringify(error)}`, 'error');
                    alert('连接失败: ' + error.message);
                    return;
                }

                log('数据库连接测试成功！', 'success');
                document.getElementById('connectionStatus').innerHTML = 
                    '<span style="color: #48bb78; font-weight: 600;">✅ 已连接</span>';
                
                alert('连接成功！');
            } catch (error) {
                log(`连接异常: ${error.message}`, 'error');
                log(`异常堆栈: ${error.stack}`, 'error');
                alert('连接失败: ' + error.message);
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            log(`切换到标签: ${tabName}`);
            
            // 更新标签样式
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // 更新面板显示
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(tabName + 'Panel').classList.add('active');
        }

        // 添加比赛（调试版）
        async function debugAddCompetition() {
            log('开始添加比赛...');

            if (!supabase) {
                log('数据库未连接！', 'error');
                alert('请先连接数据库！');
                return;
            }

            const compNumber = document.getElementById('compNumber').value.trim();
            const compName = document.getElementById('compName').value.trim();
            const compDate = document.getElementById('compDate').value;

            log(`比赛编号: ${compNumber}`);
            log(`比赛名称: ${compName}`);
            log(`比赛日期: ${compDate}`);

            if (!compNumber || !compName || !compDate) {
                log('必填字段为空！', 'error');
                alert('请填写所有必填字段！');
                return;
            }

            try {
                log('正在插入数据...');
                const { data, error } = await supabase
                    .from('competitions')
                    .insert([{
                        competition_number: compNumber,
                        name: compName,
                        competition_date: compDate
                    }])
                    .select();

                if (error) {
                    log(`插入失败: ${error.message}`, 'error');
                    log(`错误详情: ${JSON.stringify(error)}`, 'error');
                    alert('添加失败: ' + error.message);
                    return;
                }

                log(`插入成功！ID: ${data[0].id}`, 'success');
                alert('添加成功！');
            } catch (error) {
                log(`插入异常: ${error.message}`, 'error');
                alert('添加失败: ' + error.message);
            }
        }

        // 添加成绩（调试版 - 简化版）
        async function debugAddAttempt() {
            log('开始添加成绩...');

            if (!supabase) {
                log('数据库未连接！', 'error');
                alert('请先连接数据库！');
                return;
            }

            const participantName = document.getElementById('participantName').value.trim();
            const solveTime = parseFloat(document.getElementById('solveTime').value);
            const scramble = document.getElementById('scramble').value.trim();

            log(`选手: ${participantName}`);
            log(`时间: ${solveTime}`);
            log(`打乱: ${scramble}`);

            if (!participantName || !solveTime || !scramble) {
                log('必填字段为空！', 'error');
                alert('请填写所有必填字段！');
                return;
            }

            try {
                log('正在插入成绩数据...');
                const { data, error } = await supabase
                    .from('attempts')
                    .insert([{
                        participant_name: participantName,
                        solve_time: solveTime,
                        scramble: scramble,
                        cube_type: 'non_smart',
                        attempt_index: 1,
                        attempt_number: 'TEST-' + Date.now()
                    }])
                    .select();

                if (error) {
                    log(`插入失败: ${error.message}`, 'error');
                    alert('添加失败: ' + error.message);
                    return;
                }

                log(`插入成功！ID: ${data[0].id}`, 'success');
                alert('添加成功！');
            } catch (error) {
                log(`插入异常: ${error.message}`, 'error');
                alert('添加失败: ' + error.message);
            }
        }

        // 页面加载时检查
        window.addEventListener('load', () => {
            log('页面加载完成');
            checkSupabaseLibrary();
            
            // 自动填充保存的配置
            const savedUrl = localStorage.getItem('supabase_url');
            const savedKey = localStorage.getItem('supabase_key');
            
            if (savedUrl) {
                document.getElementById('supabaseUrl').value = savedUrl;
                log('已自动填充保存的 URL', 'info');
            }
            if (savedKey) {
                document.getElementById('supabaseKey').value = savedKey;
                log('已自动填充保存的 Key', 'info');
            }
        });

        // 保存配置到本地
        document.getElementById('supabaseUrl').addEventListener('change', (e) => {
            localStorage.setItem('supabase_url', e.target.value);
            log('URL 已保存到本地存储', 'info');
        });

        document.getElementById('supabaseKey').addEventListener('change', (e) => {
            localStorage.setItem('supabase_key', e.target.value);
            log('Key 已保存到本地存储', 'info');
        });
    </script>
</body>
</html>
